name: Android CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/android/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Node Dependencies
        run: pnpm install

      - name: Run Kotlin Lint
        working-directory: apps/android
        run: pnpm android:lint

      - name: Run Unit Tests
        working-directory: apps/android
        run: ./gradlew :app:testPlayDebugUnitTest

      - name: Build Debug APKs
        working-directory: apps/android
        run: |
          ./gradlew :app:assemblePlayDebug
          ./gradlew :app:assembleThirdPartyDebug

      - name: Build Release Bundles (AAB)
        run: bun run android:bundle:release

      - name: Upload Play Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-play-release
          path: apps/android/build/release-bundles/*-play-release.aab

      - name: Upload Third-Party Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-thirdparty-release
          path: apps/android/build/release-bundles/*-third-party-release.aab

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-debug-apks
          path: apps/android/app/build/outputs/apk/**/*.apk
