name: Unzip in Same Directory

on:
  workflow_dispatch: # Manual button ke liye

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip android.zip
        run: |
          # Is command se files 'app/Android/' ke andar hi unzip hongi
          unzip -o app/Android/android.zip -d app/Android/
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Files unzipped in app/Android/" || echo "No changes"
          git push
