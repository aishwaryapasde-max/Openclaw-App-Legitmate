name: Unzip Android Project

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Check if ZIP exists
        run: |
          if [ ! -f "app/Android/android.zip" ]; then
            echo "❌ android.zip not found!"
            exit 1
          fi

      - name: Unzip Project
        run: |
          echo "📦 Unzipping android.zip..."
          unzip -o app/Android/android.zip -d app/Android/

      - name: Commit changes (only if needed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "🔓 Unzipped Android project"
            git push
          else
            echo "✅ No changes to commit"
          fi
